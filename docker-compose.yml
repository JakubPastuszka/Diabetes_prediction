# Wersja produkcyjna — lekki obraz API bez AutoGluon (szybki build)
# Uruchomienie: docker compose up --build
# Streamlit: http://localhost:8501
# FastAPI:   http://localhost:8000
# Swagger:   http://localhost:8000/docs

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile          # lekki obraz (requirements-app.txt, bez AutoGluon)
    container_name: suml-api
    ports:
      - "8000:8000"
    volumes:
      - suml_data:/app/data
    env_file:
      - .env
    environment:
      - WANDB_MODE=offline
      - RUN_AUTOML=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: suml-streamlit
    ports:
      - "8501:8501"
    volumes:
      - suml_data:/app/data
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  suml_data:
